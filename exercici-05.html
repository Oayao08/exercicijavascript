<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicis
    </title>
</head>
<body>
    <!--Crea una llista buida (<ul>)
    Utilitza un bucle for per crear 5 elements de llista (<li>)
    Cada element ha de dir “Tasca ” seguit del número (Tasca 1, Tasca 2, etc.)-->

    <ul id="lista"></ul>

    <script>
        let lista = document.querySelector("#lista");

        for (let i = 1; i <= 5; i++) {
            lista.innerHTML += "<li>Tasca " + i + "</li>";        
        }
    </script>    
</body>
</html>
